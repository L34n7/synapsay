name: Apply smart routines integration

on:
  push:
    branches: [agent/completar-rotinas-inteligentes]
    paths:
      - .github/workflows/apply-smart-routines.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/completar-rotinas-inteligentes
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply focused integration
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f"anchor not found: {label}")
              return text.replace(old, new, 1)

          # Text chat: run the structured routine brain in the same request and ground the reply.
          chat_path = Path('src/app/api/chat/route.ts')
          chat = chat_path.read_text(encoding='utf-8')
          chat = replace_once(
              chat,
              'import { syncGoogleCalendarForUser, syncTaskToGoogle } from "@/lib/google-calendar/sync";\n',
              'import { syncGoogleCalendarForUser, syncTaskToGoogle } from "@/lib/google-calendar/sync";\nimport { analyzeAndApplyRoutineMessage, formatRoutineBrainResult, type RoutineBrainResult } from "@/lib/routines/brain";\n',
              'chat import',
          )
          task_catch = '''  } catch (reason) {
    console.warn("Agenda automática indisponível nesta mensagem:", reason);
  }

  let assistantMessageId = existingAssistant?.id ?? null;
'''
          routine_block = '''  } catch (reason) {
    console.warn("Agenda automática indisponível nesta mensagem:", reason);
  }

  let routineBrainResult: RoutineBrainResult | null = null;
  try {
    const { data: profile } = await supabase
      .from("profiles")
      .select("timezone")
      .eq("id", userId)
      .maybeSingle();
    routineBrainResult = await analyzeAndApplyRoutineMessage({
      supabase,
      userId,
      message: content,
      source: "text",
      timezone: profile?.timezone || "America/Sao_Paulo",
    });
  } catch (reason) {
    console.warn("Rotinas automáticas indisponíveis nesta mensagem:", reason);
  }

  let assistantMessageId = existingAssistant?.id ?? null;
'''
          chat = replace_once(chat, task_catch, routine_block, 'chat brain block')
          task_prompt = '''        taskBrainResult
          ? formatTaskBrainResult(taskBrainResult)
          : "A agenda não pôde ser consultada nesta mensagem. Não confirme criação, alteração ou lembrete sem uma operação registrada.",
        "Quando o usuário pedir para lembrar uma tarefa, nunca diga que você não consegue memorizar. Diferencie com naturalidade: a tarefa pode ser registrada imediatamente, mas um aviso exige horário. Se faltar horário, confirme apenas o que foi realmente registrado e pergunte quando deve avisar.",
'''
          routine_prompt = '''        taskBrainResult
          ? formatTaskBrainResult(taskBrainResult)
          : "A agenda não pôde ser consultada nesta mensagem. Não confirme criação, alteração ou lembrete sem uma operação registrada.",
        routineBrainResult
          ? formatRoutineBrainResult(routineBrainResult)
          : "O cérebro de rotinas não foi consultado. Não confirme criação ou alteração de rotina.",
        "Quando uma operação estruturada de rotina tiver sido concluída, confirme exatamente o resumo devolvido. Nunca diga que uma rotina foi salva sem confirmação do cérebro.",
        "Padrões frequentes são apenas interesses: sugira uma rotina e peça autorização; nunca crie automaticamente sem pedido explícito ou confirmação.",
        "Quando o usuário pedir para lembrar uma tarefa, nunca diga que você não consegue memorizar. Diferencie com naturalidade: a tarefa pode ser registrada imediatamente, mas um aviso exige horário. Se faltar horário, confirme apenas o que foi realmente registrado e pergunte quando deve avisar.",
'''
          chat = replace_once(chat, task_prompt, routine_prompt, 'chat prompt')
          chat_path.write_text(chat, encoding='utf-8')

          # Proxy: avoid processing the same routine twice now that chat does it directly.
          proxy_path = Path('src/proxy.ts')
          proxy = proxy_path.read_text(encoding='utf-8')
          proxy = '''import type { NextRequest } from "next/server";
import { updateSession } from "@/lib/supabase/proxy";

export async function proxy(request: NextRequest) {
  return updateSession(request);
}

export const config = {
  matcher: [
    "/((?!_next/static|_next/image|favicon.ico|.*\\\\.(?:svg|png|jpg|jpeg|gif|webp|js)$).*)",
  ],
};
'''
          proxy_path.write_text(proxy, encoding='utf-8')

          # Realtime token: claim routines at session start and expose the management tool.
          token_path = Path('src/app/api/realtime/token/route.ts')
          token = token_path.read_text(encoding='utf-8')
          token = replace_once(
              token,
              'import { profileBirthday, profileDisplayName } from "@/lib/user-display-name";\n',
              'import { profileBirthday, profileDisplayName } from "@/lib/user-display-name";\nimport { claimRoutineOpportunities, findRoutineSuggestion, formatRoutineOpening } from "@/lib/routines/engine";\n',
              'token import',
          )
          startup_anchor = '''  const startupBriefing = buildContinuityStartupBriefing({
    continuity,
    displayName,
    openingTriggers,
    taskBriefing,
    timeZone,
  });
  const taskContext = formatTasksForModel(openTasks.slice(0, 40));
'''
          startup_new = '''  const continuityStartupBriefing = buildContinuityStartupBriefing({
    continuity,
    displayName,
    openingTriggers,
    taskBriefing,
    timeZone,
  });
  const routineOpportunities = await claimRoutineOpportunities({
    supabase,
    userId: String(authData.claims.sub),
    conversationId: new URL(request.url).searchParams.get("conversation"),
  }).catch((reason) => {
    console.warn("Falha ao avaliar rotinas na abertura da voz:", reason);
    return [];
  });
  const routineSuggestion = await findRoutineSuggestion(
    supabase,
    String(authData.claims.sub),
  ).catch(() => null);
  const routineOpening = [
    formatRoutineOpening(routineOpportunities),
    routineSuggestion,
  ].filter(Boolean).join("\\n");
  const startupBriefing = [continuityStartupBriefing, routineOpening]
    .filter(Boolean)
    .join("\\n\\n");
  const taskContext = formatTasksForModel(openTasks.slice(0, 40));
'''
          token = replace_once(token, startup_anchor, startup_new, 'token startup')
          instruction_anchor = '''    [
      "Você possui também a ferramenta manage_tasks, que entrega a mensagem ao cérebro de agenda para consultar, criar, atualizar, concluir ou cancelar tarefas e programar lembretes.",
'''
          instruction_new = '''    [
      "Você possui a ferramenta manage_assistant_routines para criar, atualizar, pausar, excluir, confirmar, recusar e executar rotinas.",
      "Use action=process_message sempre que o usuário pedir uma rotina, mudar preferências de uma rotina, der feedback ou pedir para pausar/excluir. Envie a fala completa em message.",
      "Rotinas nunca surgem automaticamente de um hábito observado. Um padrão pode gerar apenas uma sugestão, e a criação exige confirmação explícita.",
      "Quando a abertura trouxer routineId e referenceKey, use action=execute para rotina automática; para rotina com confirmação, espere a resposta e use confirm_and_execute, decline ou disable.",
      "Só confirme uma alteração depois que a ferramenta devolver handled=true ou status concluído.",
    ].join(" "),
    [
      "Você possui também a ferramenta manage_tasks, que entrega a mensagem ao cérebro de agenda para consultar, criar, atualizar, concluir ou cancelar tarefas e programar lembretes.",
'''
          token = replace_once(token, instruction_anchor, instruction_new, 'token instructions')
          tools_anchor = '''            {
              type: "function",
              name: "manage_tasks",
'''
          routine_tool = '''            {
              type: "function",
              name: "manage_assistant_routines",
              description:
                "Cria e modifica rotinas por linguagem natural e confirma, recusa ou executa oportunidades de rotina da abertura.",
              parameters: {
                type: "object",
                additionalProperties: false,
                required: ["action", "message", "routineId", "referenceKey"],
                properties: {
                  action: {
                    type: "string",
                    enum: ["process_message", "execute", "confirm_and_execute", "decline", "disable"],
                  },
                  message: { type: ["string", "null"] },
                  routineId: { type: ["string", "null"] },
                  referenceKey: { type: ["string", "null"] },
                },
              },
            },
            {
              type: "function",
              name: "manage_tasks",
'''
          token = replace_once(token, tools_anchor, routine_tool, 'token tool')
          token_path.write_text(token, encoding='utf-8')

          # Voice client: collect interest signals and execute realtime routine tool calls.
          dashboard_path = Path('src/app/dashboard/page.tsx')
          dashboard = dashboard_path.read_text(encoding='utf-8')
          memory_tail = '''              .catch((memoryError) => {
                console.warn(
                  "Falha ao iniciar memória automática:",
                  memoryError,
                );
              });
          }
'''
          routine_signal = '''              .catch((memoryError) => {
                console.warn(
                  "Falha ao iniciar memória automática:",
                  memoryError,
                );
              });
            void fetch("/api/routines/brain", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message: normalized, source: "voice" }),
            }).catch((routineError) => {
              console.warn("Falha ao analisar rotina na voz:", routineError);
            });
          }
'''
          dashboard = replace_once(dashboard, memory_tail, routine_signal, 'voice signal')
          task_end = '''  const applyRealtimeVoice = useCallback((voice: string) => {
'''
          routine_callback = '''  const executeRoutineAssistant = useCallback(
    async (call: RealtimeFunctionCall) => {
      const channel = dataChannelRef.current;
      if (!channel || channel.readyState !== "open" || call.name !== "manage_assistant_routines" || !call.call_id) {
        return false;
      }
      let args: { action?: string; message?: string | null; routineId?: string | null; referenceKey?: string | null } = {};
      try { args = JSON.parse(call.arguments || "{}"); } catch { args = {}; }
      let output: unknown;
      try {
        if (args.action === "process_message") {
          const response = await fetch("/api/routines/brain", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: args.message || latestUserTranscriptRef.current, source: "voice" }),
          });
          output = await response.json();
        } else {
          const decision = args.action === "disable" ? "disable" : args.action === "decline" ? "decline" : "confirm";
          if (args.action !== "execute") {
            const confirmation = await fetch("/api/routines/confirm", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ routineId: args.routineId, referenceKey: args.referenceKey, decision }),
            });
            output = await confirmation.json();
            if (!confirmation.ok || args.action === "decline" || args.action === "disable") {
              channel.send(JSON.stringify({ type: "conversation.item.create", item: { type: "function_call_output", call_id: call.call_id, output: JSON.stringify(output) } }));
              return true;
            }
          }
          const execution = await fetch("/api/routines/execute", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ routineId: args.routineId, referenceKey: args.referenceKey }),
          });
          output = await execution.json();
        }
      } catch (reason) {
        output = { error: reason instanceof Error ? reason.message : "Não foi possível processar a rotina." };
      }
      channel.send(JSON.stringify({
        type: "conversation.item.create",
        item: { type: "function_call_output", call_id: call.call_id, output: JSON.stringify(output) },
      }));
      return true;
    },
    [],
  );

  const applyRealtimeVoice = useCallback((voice: string) => {
'''
          dashboard = replace_once(dashboard, task_end, routine_callback, 'routine callback')
          calls_old = '''              "search_conversation_history",
              "manage_tasks",
              "configure_assistant_personality",
'''
          calls_new = '''              "search_conversation_history",
              "manage_tasks",
              "manage_assistant_routines",
              "configure_assistant_personality",
'''
          dashboard = replace_once(dashboard, calls_old, calls_new, 'routine call list')
          dispatch_old = '''              call.name === "manage_tasks"
                ? executeTaskAssistant(call)
                : call.name === "configure_assistant_personality"
                  ? executePersonalityAssistant(call)
                  : executeHistorySearch(call),
'''
          dispatch_new = '''              call.name === "manage_tasks"
                ? executeTaskAssistant(call)
                : call.name === "manage_assistant_routines"
                  ? executeRoutineAssistant(call)
                  : call.name === "configure_assistant_personality"
                    ? executePersonalityAssistant(call)
                    : executeHistorySearch(call),
'''
          dashboard = replace_once(dashboard, dispatch_old, dispatch_new, 'routine dispatch')
          dashboard_path.write_text(dashboard, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run lint
          npm run build

      - name: Commit validated integration
        run: |
          rm .github/workflows/apply-smart-routines.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/chat/route.ts src/app/api/realtime/token/route.ts src/app/dashboard/page.tsx src/proxy.ts .github/workflows/apply-smart-routines.yml
          git commit -m "Connect smart routines to text and realtime voice"
          git push origin agent/completar-rotinas-inteligentes
