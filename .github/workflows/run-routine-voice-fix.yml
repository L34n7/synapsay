name: Run routine voice fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corrigir-rotinas-voz
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply patch
        run: python scripts/apply-routine-voice-fix.py
      - run: npm install
      - run: npm run build
      - name: Commit validated fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/realtime/token/route.ts src/app/dashboard/page.tsx
          git commit -m "fix: persistir rotinas criadas por voz" || exit 0
          git push origin agent/corrigir-rotinas-voz
