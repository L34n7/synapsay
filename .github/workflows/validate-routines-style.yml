name: Validate routines style

on:
  pull_request:
    branches: [main]
    paths:
      - src/app/rotinas/**
      - .github/workflows/validate-routines-style.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: routines-build-log
          path: build.log
      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
